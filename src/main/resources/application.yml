spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${RDS_AWS_HOST}:3306/${RDS_DB}
    username: ${RDS_USER}
    password: ${RDS_PASSWORD}
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        database-platform: org.hibernate.dialect.MySQL8Dialect
        show_sql: true
        format_sql: true
  mvc:
    servlet:
      path: /api
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-validity: ${JWT_VALIDITY}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    tryItOutEnabled: true
    defaultModelsExpandDepth: 0

payment:
  base-url: ${PAYMENT_BASE_URL}
  secret-key: ${PAYMENT_SECRET_KEY}
  store-id: ${PAYMENT_STORE_ID}
  store-prefix: ${PAYMENT_STORE_PREFIX}
