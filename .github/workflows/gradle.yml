name: Cgv-Clone CI/CD

on:
  push:
    branches: [ "master" ]

permissions:
    contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    # 1) 리포지토리 코드 체크아웃
    - name: checkout
      uses: actions/checkout@v4

    # 2) JDK 17 환경 설정
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3) Gradle 빌드
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    - name: Build with Gradle Wrapper
      run: ./gradlew build

    # 4) 도커 허브 로그인
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 5) Docker 이미지 빌드 (Spring Boot 앱)
    - name: Build Docker image for CGV Clone app
      run: |
        docker build -t immmii/cgv-clone:latest .

    # 6) DockerHub로 푸시
    - name: Push image to Docker Hub
      run: |
        docker push immmii/cgv-clone:latest
          
    ## step5. 원격 서버(EC2)에 SSH로 접속해 배포를 수행합니다.
    - name: executing remote ssh commands using password
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}    # EC2 호스트 주소
        username: ubuntu             # 로그인할 사용자
        key: ${{ secrets.KEY }}      # 개인 키 (.pem)
        script: |
          cd /home/ubuntu/
          
          sudo touch .env
          echo "${{ secrets.ENV_VARS }}" | sudo tee .env > /dev/null
          
          sudo touch docker-compose.yaml
          echo "${{ vars.DOCKER_COMPOSE }}" | sudo tee docker-compose.yaml > /dev/null
            
          sudo chmod 666 /var/run/docker.sock   
            
          sudo docker rm -f $(docker ps -qa)
            
          sudo docker pull my-repo/my-web-image
            
          docker-compose -f docker-compose.yaml --env-file ./.env up -d
            
          docker image prune -f
