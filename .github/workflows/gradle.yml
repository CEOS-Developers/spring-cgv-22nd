name: Cgv-Clone CI/CD

on:
  push:
    branches: [ "master" ]

permissions:
    contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    # 1) 리포지토리 코드 체크아웃
    - name: checkout
      uses: actions/checkout@v4

    # 2) JDK 17 환경 설정
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3) Gradle Wrapper 검증 + 캐시
    - name: Validate Gradle Wrapper
      uses: gradle/wrapper-validation-action@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # 4) working-directory 지정 및 클린 빌드
    - name: Build
      working-directory: cgv_clone
      run: ./gradlew clean bootJar

    # 5) 도커 허브 로그인 및 image 빌드 & 푸시
    - name: Log in to Docker Hub
      run: |
        docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
        docker build -t immmii/cgv-clone:latest ./cgv_clone
        docker push immmii/cgv-clone:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:

    # 8)원격 서버(EC2)에 SSH로 접속해 배포를 수행합니다.
    - name: executing remote ssh commands using password
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}    # EC2 호스트 주소
        username: ubuntu             # 로그인할 사용자
        key: ${{ secrets.KEY }}      # 개인 키 (.pem)
        script: |
          cd /home/ubuntu/
          
          sudo touch .env
          echo "${{ secrets.ENV_VARS }}" | sudo tee .env > /dev/null
          
          sudo touch docker-compose.yaml
          echo "${{ vars.DOCKER_COMPOSE }}" | sudo tee docker-compose.yaml > /dev/null
            
          sudo docker pull immmii/cgv-clone:latest
            
          docker-compose -f docker-compose.yaml --env-file ./.env up -d
            
          docker image prune -f
